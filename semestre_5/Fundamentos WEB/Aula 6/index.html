<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Aula 6</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <!-- NAVBAR -->
        <nav class="navbar navbar-dark bg-dark">
            <div class="container">
                <a class="navbar-brand" href="#">Meu Site</a>
                <form class="d-flex">
                    <input class="form-control me-2" type="search" placeholder="Pesquisar...">
                    <button class="btn btn-danger"><i class="bi bi-search"></i></button>
                </form>
            </div>
        </nav>

        <div class="container mt-4">
            <!-- CARROSEL -->
            <div id="c" class="carousel slide mb-4" data-bs-ride="carousel">
                <div class="carousel-inner">
                    <div class="carousel-item active"><img src="https://placehold.co/800x300/0d6efd/white?text=HTML" class="d-block w-100"></div>
                    <div class="carousel-item"><img src="https://placehold.co/800x300/198754/white?text=CSS" class="d-block w-100"></div>
                    <div class="carousel-item"><img src="https://placehold.co/800x300/dc3545/white?text=JS" class="d-block w-100"></div>
                    <div class="carousel-item"><img src="https://placehold.co/800x300/dc3545/white?text=BOOTSTRAS" class="d-block w-100"></div>
                </div>
                <button class="carousel-control-prev" type="button" data-bs-target="#c" data-bs-slide="prev"><span class="carousel-control-prev-icon"></span></button>
                <button class="carousel-control-next" type="button" data-bs-target="#c" data-bs-slide="next"><span class="carousel-control-next-icon"></span></button>
            </div>
            <!-- ACCORDION -->
            <div class="accordion mb-4" id="ac">
                <div class="accordion-item">
                    <h2 class="accordion-header"><button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#a1">O que é HTML?</button></h2>
                    <div id="a1" class="accordion-collapse collapse show" data-bs-parent="#ac"><div class="accordion-body">HTML define a estrutura de uma página web.</div></div>
                </div>
                <div class="accordion-item">
                    <h2 class="accordion-header"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#a2">O que é CSS?</button></h2>
                    <div id="a2" class="accordion-collapse collapse" data-bs-parent="#ac"><div class="accordion-body">CSS estiliza a página: cores, fontes e layout.</div></div>
                </div>
                <div class="accordion-item">
                    <h2 class="accordion-header"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#a3">O que é JavaScript?</button></h2>
                    <div id="a3" class="accordion-collapse collapse" data-bs-parent="#ac"><div class="accordion-body">JavaScript torna a página interativa e dinâmica.</div></div>
                </div>
                <div class="accordion-item">
                    <h2 class="accordion-header"><button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#a4">O que é Bootstrap?</button></h2>
                    <div id="a4" class="accordion-collapse collapse" data-bs-parent="#ac"><div class="accordion-body">Bootstrap oferece componentes prontos para sites responsivos.</div></div>
                </div>
            </div>
            <!-- CARDS -->
            <div class="row row-cols-2 row-cols-md-4 g-3 mb-4">
                <div class="col"><div class="card text-center p-3"><h5>HTML</h5><a href="https://www.w3schools.com/html/" target="_blank" class="btn" style="background:rgb(228, 131, 5);color:white">W3Schools</a></div></div>
                <div class="col"><div class="card text-center p-3"><h5>CSS</h5><a href="https://www.w3schools.com/css/" target="_blank" class="btn btn-primary">W3Schools</a></div></div>
                <div class="col"><div class="card text-center p-3"><h5>JavaScript</h5><a href="https://www.w3schools.com/js/" target="_blank" class="btn btn-warning">W3Schools</a></div></div>
                <div class="col"><div class="card text-center p-3"><h5>Bootstrap</h5><a href="https://www.w3schools.com/bootstrap5/" target="_blank" class="btn" style="background:purple;color:white">W3Schools</a></div></div>
            </div>

        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
