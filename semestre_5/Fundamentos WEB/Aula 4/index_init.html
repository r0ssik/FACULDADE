<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>Teclado de Animais</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <article>
        <h1 id="title" class="txt">Title</h1>

        <section class="teclado">
            <button class="tecla tecla_gato">GATO</button>
            <button class="tecla tecla_macaco">MACACO</button>
            <button class="tecla tecla_baleia">BALEIA</button>
            <button class="tecla tecla_papagaio">PAPAGAIO</button>
            <button class="tecla tecla_elefante">ELEFANTE</button>
            <button class="tecla tecla_hiena">HIENA</button>
        </section>
</article>

<audio src="sound/macaco.mp3" id="tecla_macaco"></audio>
<audio src="sound/gato.mp3" id="tecla_gato"></audio>
<audio src="sound/baleia.mp3" id="tecla_baleia"></audio>
<audio src="sound/papagaio.mp3" id="tecla_papagaio"></audio>
<audio src="sound/elefante.mp3" id="tecla_elefante"></audio>
<audio src="sound/hiena.mp3" id="tecla_hiena"></audio>

<script src="main.js"></script>
</body>
</html>
